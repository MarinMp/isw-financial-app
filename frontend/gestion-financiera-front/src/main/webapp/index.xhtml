<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Gestión Financiera</title>
</h:head>
<h:body>

    <h2 style="margin-bottom: 10px; text-align: center;">Gestión de Clientes</h2>

    <h:form id="form">
        <p:growl id="growl" showDetail="true"/>

        <p:commandButton value="Nuevo Cliente" icon="pi pi-plus"
                         oncomplete="PF('dialogNuevoCliente').show()"
                         update=":form:growl"
                         style="margin-bottom: 10px;"/>

        <p:dataTable id="tablaClientes" var="cliente"
                     value="#{clienteBean.clientes}"
                     rowKey="#{cliente.idCliente}"
                     emptyMessage="No hay clientes registrados">
            <p:column headerText="ID">
                <h:outputText value="#{cliente.idCliente}"/>
            </p:column>
            <p:column headerText="Número Identificación">
                <h:outputText value="#{cliente.numeroIdentificacion}"/>
            </p:column>
            <p:column headerText="Nombre Completo">
                <h:outputText value="#{cliente.nombreCompleto}"/>
            </p:column>
            <p:column headerText="Correo Electrónico">
                <h:outputText value="#{cliente.correoElectronico}"/>
            </p:column>
        </p:dataTable>
    </h:form>

    <p:dialog header="Nuevo Cliente" widgetVar="dialogNuevoCliente"
              modal="true" showEffect="fade" hideEffect="fade">
        <h:form id="formNuevoCliente">
            <p:panelGrid columns="2">
                <p:outputLabel for="numeroId" value="Número de Identificación:"/>
                <p:inputText id="numeroId"
                             value="#{clienteBean.nuevoCliente.numeroIdentificacion}"
                             required="true"
                             requiredMessage="El número de identificación es obligatorio"/>

                <p:outputLabel for="nombre" value="Nombre Completo:"/>
                <p:inputText id="nombre"
                             value="#{clienteBean.nuevoCliente.nombreCompleto}"
                             required="true"
                             requiredMessage="El nombre completo es obligatorio"/>

                <p:outputLabel for="correo" value="Correo Electrónico:"/>
                <p:inputText id="correo"
                             value="#{clienteBean.nuevoCliente.correoElectronico}"
                             required="true"
                             requiredMessage="El correo electrónico es obligatorio"/>
            </p:panelGrid>

            <p:commandButton value="Guardar"
                             action="#{clienteBean.registrarCliente}"
                             update=":form:tablaClientes :form:growl :formNuevoCliente"
                             oncomplete="if(args &amp;&amp; !args.validationFailed &amp;&amp; #{clienteBean.registroExitoso}) PF('dialogNuevoCliente').hide()"/>
            <p:commandButton value="Cancelar"
                             onclick="PF('dialogNuevoCliente').hide()"
                             styleClass="ui-button-secondary"
                             type="button"/>
        </h:form>
    </p:dialog>
</h:body>
</html>
